name: CI

# Main CI workflow for MCP Filesystem Ultra
# - Runs tests (with race detector) on Linux and Windows
# - Builds all binaries using the project's build scripts (output goes to bin/)
# - Runs security scanning with govulncheck
#
# Triggered on push and PRs to main.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Bump to 1.26.4+ for stdlib security fixes (GO-2026-5039, GO-2026-5037
  # in net/textproto and crypto/x509 — both fixed in 1.26.4).
  GO_VERSION: '1.26.4'

jobs:
  # ============================================================
  # TEST JOB
  # ============================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run all tests (with race detector)
        run: go test -race ./... -count=1

      - name: Run focused core + security tests
        run: |
          go test -race ./core/... -count=1
          go test -race ./tests/security/... -count=1

  # ============================================================
  # BUILD JOB
  # ============================================================
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # The `embed_rg` build embeds ripgrep binaries via //go:embed. Those
      # binaries are git-ignored (the project ignores *.exe) and are NOT
      # checked in, so we have to fetch them before the build runs.
      # download.sh writes files with the exact names embed.go expects.
      - name: Download ripgrep binaries for embed_rg
        shell: bash
        run: bash embed/ripgrep/download.sh

      - name: Build all binaries (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x build-windows.sh
          ./build-windows.sh

      - name: Build all binaries (Windows)
        if: runner.os == 'Windows'
        run: .\build-windows.bat

      - name: Verify binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          dir bin\
          if not exist bin\filesystem-ultra-v4.exe exit /b 1
          if not exist bin\mcp-proxy.exe exit /b 1

      - name: Verify binaries (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ls -la bin/
          test -f bin/filesystem-ultra-v4 || exit 1
          test -f bin/mcp-proxy || exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: bin/
          retention-days: 7

  # ============================================================
  # SECURITY JOB
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (Go stdlib + dependencies)
        run: govulncheck ./...

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum are not tidy" && exit 1)

      - name: Check Go formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Some files are not gofmt'ed:"
            gofmt -l .
            exit 1
          fi

